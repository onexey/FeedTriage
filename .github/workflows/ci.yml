name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore FeedTriage.sln

      - name: Build solution
        run: dotnet build FeedTriage.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test FeedTriage.sln --configuration Release --no-build --verbosity normal